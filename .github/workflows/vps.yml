name: GitHub-VPS
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: VPS Qurulur
        run: |
          Invoke-WebRequest https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip
          net user runneradmin "Vps12345!" /add
          net localgroup administrators runneradmin /add
          ./ngrok/ngrok.exe authtoken "3BcGhxJdpZFxKdIeYYhLTqoIYmJ_4kWcZoJk4xPmmVpVn8pNW"
          
          Write-Host "🚀 VPS Başladılır... 20 saniyə gözləyin."
          Start-Process ./ngrok/ngrok.exe -ArgumentList "tcp 3389"
          Start-Sleep -Seconds 20
          
      - name: Linki Çıxar
        run: |
          $url = ""
          for ($i=1; $i -le 6; $i++) {
              try {
                  $content = Invoke-WebRequest -Uri http://localhost:4040/api/tunnels -UseBasicParsing
                  $json = $content.Content | ConvertFrom-Json
                  $url = $json.tunnels[0].public_url
                  if ($url) { break }
              } catch { 
                  Write-Host "⏳ Gözlənilir..."
                  Start-Sleep -Seconds 5 
              }
          }
          Write-Host "`n=========================================="
          Write-Host "🔗 ÜNVAN: $url"
          Write-Host "👤 AD: runneradmin | 🔑 ŞİFRƏ: Vps12345!"
          Write-Host "==========================================`n"
          
          if ($url) {
              while($true) { Start-Sleep -Seconds 3600 }
          } else {
              Write-Host "❌ Link tapılmadı. Ngrok panelini yoxlayın."
              exit 1
          }
