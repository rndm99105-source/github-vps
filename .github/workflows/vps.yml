name: GitHub-VPS
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Ngrok və RDP Hazırlığı
        run: |
          # Ngrok yüklənilir
          Invoke-WebRequest https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip
          
          # İstifadəçi ayarları
          net user runneradmin "Vps12345!" /add
          net localgroup administrators runneradmin /add
          
          # RDP-ni aktivləşdiririk
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # Sənin Ngrok Tokenin
          ./ngrok/ngrok.exe authtoken "3BcGhxJdpZFxKdIeYYhLTqoIYmJ_4kWcZoJk4xPmmVpVn8pNW"
          
          # Ngrok-u log yazaraq başladırıq
          Start-Process ./ngrok/ngrok.exe -ArgumentList "tcp 3389 --log=stdout" -RedirectStandardOutput "ngrok.log"
          
          # 30 saniyə tam gözləyirik
          Start-Sleep -Seconds 30

      - name: VPS Linkini Göstər
        run: |
          # Linki log faylından birbaşa oxuyuruq (Xətasız üsul)
          $log = Get-Content ngrok.log
          $line = $log | Select-String "url=tcp://"
          $url = ($line -split "url=")[1]
          
          Write-Host "`n"
          Write-Host "=========================================="
          Write-Host "🚀 VPS ARTIQ ONLINEDIR!"
          Write-Host "🔗 ÜNVAN: $url"
          Write-Host "👤 İSTİFADƏÇİ: runneradmin"
          Write-Host "🔑 ŞİFRƏ: Vps12345!"
          Write-Host "=========================================="
          Write-Host "`n"

      - name: Bağlanma (6 Saat Aktivdir)
        run: |
          while($true) { Start-Sleep -Seconds 3600 }
