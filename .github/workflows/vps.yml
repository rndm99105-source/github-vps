name: GitHub-VPS
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: NGROK və Şifrə Quraşdırılması
        run: |
          # Ngrok yüklənilir
          Invoke-WebRequest https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip
          
          # Şifrəni təyin edirik (Giriş üçün bu şifrəni istifadə edəcəksən)
          net user runneradmin "Vps12345!" /add
          net localgroup administrators runneradmin /add
          
          # Ngrok authtoken aktiv edilir
          ./ngrok/ngrok.exe authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          
          # Ngrok arxa planda başladılır
          Start-Process ./ngrok/ngrok.exe -ArgumentList "tcp 3389"
          
          # Ngrok-un açılması üçün 10 saniyə gözləyirik (Xətanın qarşısını alır)
          Start-Sleep -Seconds 10

      - name: Qoşulma Ünvanını Al
        run: |
          $tunnels = (Invoke-WebRequest -Uri http://localhost:4040/api/tunnels -UseBasicParsing | ConvertFrom-Json).tunnels
          $public_url = $tunnels[0].public_url
          Write-Host "`n"
          Write-Host "=========================================="
          Write-Host "🔗 VPS ÜNVANI: $public_url"
          Write-Host "👤 İSTİFADƏÇİ: runneradmin"
          Write-Host "🔑 ŞİFRƏ: Vps12345!"
          Write-Host "=========================================="
          Write-Host "`n"

      - name: Serveri 6 Saat Aktiv Saxla
        run: |
          while($true) { Start-Sleep -Seconds 3600 }
