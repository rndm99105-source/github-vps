name: GitHub-VPS
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Ngrok və Giriş Ayarları
        run: |
          # Ngrok yüklənilir
          Invoke-WebRequest https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip
          
          # İstifadəçi şifrəsi (Xəta verməməsi üçün yoxlayıb yaradırıq)
          $Password = ConvertTo-SecureString "Vps12345!" -AsPlainText -Force
          if (!(Get-LocalUser -Name "runneradmin" -ErrorAction SilentlyContinue)) {
              New-LocalUser -Name "runneradmin" -Password $Password -Description "VPS User"
              Add-LocalGroupMember -Group "Administrators" -Member "runneradmin"
          }
          
          # Ngrok Authtoken
          ./ngrok/ngrok.exe authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          
          # Ngrok Başladılır
          Start-Process ./ngrok/ngrok.exe -ArgumentList "tcp 3389"
          
          # 20 saniyə tam gözləyirik ki, tunel stabil qalsın
          Start-Sleep -Seconds 20

      - name: Qoşulma Ünvanını Ekrana Çıxar
        run: |
          # Tunel linkini Ngrok API-dən ehtiyatlı şəkildə çəkirik
          $response = Invoke-WebRequest -Uri http://localhost:4040/api/tunnels -UseBasicParsing
          $json = $response.Content | ConvertFrom-Json
          $url = $json.tunnels[0].public_url
          
          Write-Host "`n"
          Write-Host "=========================================="
          Write-Host "🚀 VPS HAZIRDIR!"
          Write-Host "🔗 ÜNVAN: $url"
          Write-Host "👤 İSTİFADƏÇİ: runneradmin"
          Write-Host "🔑 ŞİFRƏ: Vps12345!"
          Write-Host "=========================================="
          Write-Host "`n"

      - name: Canlı Saxla (6 Saat)
        run: |
          # Serverin bağlanmaması üçün döngü
          while($true) { Start-Sleep -Seconds 3600 }
